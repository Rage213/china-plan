<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="StratiX VPN panel preview: private 3AX-UI access screen."
    />
    <title>StratiX VPN Panel Preview</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      :root {
        color-scheme: dark;
        --bg: #0a1320;
        --bg-2: #1d2938;
        --surface: rgba(25, 37, 54, 0.9);
        --surface-muted: rgba(255, 255, 255, 0.065);
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(255, 255, 255, 0.18);
        --text: #f5f7fb;
        --muted: rgba(245, 247, 251, 0.68);
        --dim: rgba(245, 247, 251, 0.46);
        --accent: #15a895;
        --accent-strong: #0a796d;
        --focus: rgba(21, 168, 149, 0.22);
        --shadow: 0 34px 95px rgba(0, 0, 0, 0.34);
        --soft-shadow: 0 14px 42px rgba(0, 0, 0, 0.24);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 82% 16%, rgba(98, 102, 217, 0.24), transparent 32%),
          radial-gradient(circle at 14% 82%, rgba(21, 168, 149, 0.22), transparent 30%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        background-size:
          48px 48px,
          48px 48px,
          auto,
          auto,
          auto;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page {
        position: relative;
        isolation: isolate;
        min-height: 100vh;
      }

      .page::after {
        position: fixed;
        right: -8vw;
        bottom: -25vh;
        left: -8vw;
        z-index: 0;
        height: 34vh;
        content: "";
        background:
          linear-gradient(170deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)),
          linear-gradient(7deg, transparent 0 43%, rgba(21, 168, 149, 0.24) 44% 49%, transparent 50%),
          linear-gradient(-6deg, transparent 0 33%, rgba(98, 102, 217, 0.24) 34% 39%, transparent 40%);
        transform: skewY(-3deg);
      }

      .shell {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        width: min(1120px, calc(100vw - 48px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 42px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        font-size: 21px;
        font-weight: 800;
        text-decoration: none;
      }

      .brand-mark,
      .card-mark {
        display: grid;
        place-items: center;
        border-radius: var(--radius);
        background: #f5f7fb;
        color: #0d1827;
        font-weight: 800;
        box-shadow: var(--soft-shadow);
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        font-size: 12px;
      }

      .language-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .language-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.055);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .language-button.is-active {
        border-color: rgba(10, 134, 120, 0.42);
        background: rgba(21, 168, 149, 0.14);
        color: #e3fffb;
      }

      .preview-stage {
        display: grid;
        flex: 1;
        place-items: center;
        padding: clamp(54px, 11vh, 118px) 0 30px;
      }

      .login-card {
        position: relative;
        width: min(100%, 430px);
        padding: 34px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .card-mark {
        width: 46px;
        height: 46px;
        font-size: 13px;
      }

      .card-title {
        margin: 28px 0 6px;
        color: var(--text);
        font-size: 30px;
        font-weight: 800;
        line-height: 1.18;
      }

      .card-subtitle {
        margin: 0 0 30px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .form {
        display: grid;
        gap: 14px;
      }

      .field {
        position: relative;
        display: block;
      }

      .field > svg {
        position: absolute;
        top: 50%;
        left: 17px;
        width: 18px;
        height: 18px;
        color: var(--dim);
        pointer-events: none;
        transform: translateY(-50%);
      }

      .field input {
        width: 100%;
        height: 52px;
        padding: 0 46px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        outline: none;
        appearance: none;
        background: var(--surface-muted);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        line-height: 52px;
      }

      .field input::placeholder {
        color: var(--dim);
        font-weight: 600;
      }

      .field input:focus {
        border-color: rgba(10, 134, 120, 0.58);
        box-shadow: 0 0 0 3px var(--focus);
      }

      .eye-button {
        position: absolute;
        top: 50%;
        right: 11px;
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--dim);
        transform: translateY(-50%);
      }

      .eye-button svg {
        width: 18px;
        height: 18px;
      }

      .submit {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 52px;
        margin-top: 4px;
        border: 1px solid var(--accent-strong);
        border-radius: var(--radius);
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        box-shadow: 0 16px 34px rgba(21, 168, 149, 0.22);
      }

      .submit:focus-visible,
      .language-button:focus-visible,
      .eye-button:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      @media (max-width: 560px) {
        .shell {
          width: min(100vw - 28px, 430px);
          padding-top: 20px;
        }

        .brand {
          font-size: 19px;
        }

        .preview-stage {
          padding-top: 44px;
        }

        .login-card {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <header class="nav">
          <a class="brand" href="#" aria-label="StratiX VPN">
            <span class="brand-mark">SX</span>
            <span>StratiX VPN</span>
          </a>

          <div class="language-controls" aria-label="Language">
            <button class="language-button is-active" type="button" data-language="ru">RU</button>
            <button class="language-button" type="button" data-language="en">EN</button>
          </div>
        </header>

        <main class="preview-stage">
          <section class="login-card" aria-label="Login preview">
            <span class="card-mark">SX</span>
            <h1 class="card-title" data-i18n="loginTitle">Вход</h1>
            <p class="card-subtitle" data-i18n="loginSubtitle">Доступ только для администратора</p>

            <form class="form" aria-label="Demo login form">
              <label class="field">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
                <input autocomplete="off" type="text" data-i18n-placeholder="username" />
              </label>
              <label class="field">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M7 10V8a5 5 0 0 1 10 0v2M6.5 10h11A1.5 1.5 0 0 1 19 11.5v7A1.5 1.5 0 0 1 17.5 20h-11A1.5 1.5 0 0 1 5 18.5v-7A1.5 1.5 0 0 1 6.5 10Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
                <input autocomplete="off" type="password" data-i18n-placeholder="password" />
                <button class="eye-button" type="button" aria-label="Show password" data-password-toggle>
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                      d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"
                      stroke="currentColor"
                      stroke-width="1.7"
                    />
                    <path
                      d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                      stroke="currentColor"
                      stroke-width="1.7"
                    />
                  </svg>
                </button>
              </label>
              <button class="submit" type="submit" data-i18n="loginButton">Войти</button>
            </form>
          </section>
        </main>
      </div>
    </div>

    <script>
      const dictionary = {
        ru: {
          loginTitle: "Вход",
          loginSubtitle: "Доступ только для администратора",
          username: "Логин",
          password: "Пароль",
          loginButton: "Войти"
        },
        en: {
          loginTitle: "Sign in",
          loginSubtitle: "Administrator access only",
          username: "Username",
          password: "Password",
          loginButton: "Log in"
        }
      };

      const state = {
        language: localStorage.getItem("stratix-preview-language") || "ru"
      };

      function translate() {
        const copy = dictionary[state.language];
        document.documentElement.lang = state.language;
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          node.textContent = copy[key];
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
          const key = node.getAttribute("data-i18n-placeholder");
          node.setAttribute("placeholder", copy[key]);
        });
        document.querySelectorAll("[data-language]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.language === state.language);
        });
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () => {
          state.language = button.dataset.language;
          localStorage.setItem("stratix-preview-language", state.language);
          translate();
        });
      });

      document.querySelector("[data-password-toggle]").addEventListener("click", () => {
        const input = document.querySelector('input[type="password"], input[data-password-visible]');
        const isVisible = input.type === "text";
        input.type = isVisible ? "password" : "text";
        input.toggleAttribute("data-password-visible", !isVisible);
      });

      document.querySelector(".form").addEventListener("submit", (event) => {
        event.preventDefault();
      });

      translate();
    </script>
  </body>
</html>
