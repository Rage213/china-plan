<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="StratiX VPN panel preview: private 3AX-UI access screen."
    />
    <title>StratiX VPN Panel Preview</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      :root {
        color-scheme: dark;
        --bg: #0a1320;
        --bg-2: #1d2938;
        --surface: rgba(25, 37, 54, 0.9);
        --surface-muted: rgba(255, 255, 255, 0.065);
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(255, 255, 255, 0.18);
        --text: #f5f7fb;
        --muted: rgba(245, 247, 251, 0.68);
        --dim: rgba(245, 247, 251, 0.46);
        --accent: #15a895;
        --accent-strong: #0a796d;
        --accent-rgb: 21, 168, 149;
        --glow-a-rgb: 98, 102, 217;
        --glow-b-rgb: 21, 168, 149;
        --focus: rgba(var(--accent-rgb), 0.22);
        --shadow: 0 34px 95px rgba(0, 0, 0, 0.34);
        --soft-shadow: 0 14px 42px rgba(0, 0, 0, 0.24);
        --radius: 8px;
      }

      body[data-theme="violet"] {
        --bg: #100f24;
        --bg-2: #251f3e;
        --surface: rgba(31, 28, 55, 0.9);
        --surface-muted: rgba(255, 255, 255, 0.07);
        --accent: #8b7cf6;
        --accent-strong: #5e50c9;
        --accent-rgb: 139, 124, 246;
        --glow-a-rgb: 139, 124, 246;
        --glow-b-rgb: 34, 211, 238;
      }

      body[data-theme="amber"] {
        --bg: #17120c;
        --bg-2: #2b2116;
        --surface: rgba(43, 32, 21, 0.9);
        --surface-muted: rgba(255, 255, 255, 0.065);
        --accent: #f1a638;
        --accent-strong: #ad6315;
        --accent-rgb: 241, 166, 56;
        --glow-a-rgb: 241, 166, 56;
        --glow-b-rgb: 21, 168, 149;
      }

      body[data-theme="blue"] {
        --bg: #071528;
        --bg-2: #172b47;
        --surface: rgba(21, 39, 63, 0.9);
        --surface-muted: rgba(255, 255, 255, 0.065);
        --accent: #4d9fff;
        --accent-strong: #276bc4;
        --accent-rgb: 77, 159, 255;
        --glow-a-rgb: 77, 159, 255;
        --glow-b-rgb: 125, 92, 255;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 82% 16%, rgba(var(--glow-a-rgb), 0.24), transparent 32%),
          radial-gradient(circle at 14% 82%, rgba(var(--glow-b-rgb), 0.22), transparent 30%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        background-size:
          48px 48px,
          48px 48px,
          auto,
          auto,
          auto;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .is-hidden {
        display: none !important;
      }

      .page {
        position: relative;
        isolation: isolate;
        min-height: 100vh;
      }

      .page::after {
        position: fixed;
        right: -8vw;
        bottom: -25vh;
        left: -8vw;
        z-index: 0;
        height: 34vh;
        content: "";
        background:
          linear-gradient(170deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)),
          linear-gradient(7deg, transparent 0 43%, rgba(var(--glow-b-rgb), 0.24) 44% 49%, transparent 50%),
          linear-gradient(-6deg, transparent 0 33%, rgba(var(--glow-a-rgb), 0.24) 34% 39%, transparent 40%);
        transform: skewY(-3deg);
      }

      .shell {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        width: min(1120px, calc(100vw - 48px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 42px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        font-size: 21px;
        font-weight: 800;
        text-decoration: none;
      }

      .brand-mark,
      .card-mark {
        display: grid;
        place-items: center;
        border-radius: var(--radius);
        background: #f5f7fb;
        color: #0d1827;
        font-weight: 800;
        box-shadow: var(--soft-shadow);
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        font-size: 12px;
      }

      .panel-controls {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .theme-controls,
      .language-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .theme-swatch {
        position: relative;
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background:
          linear-gradient(135deg, var(--swatch-a), var(--swatch-b));
        box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.08);
        padding: 0;
      }

      .theme-swatch.is-active {
        border-color: rgba(var(--accent-rgb), 0.74);
        box-shadow:
          inset 0 0 0 4px rgba(255, 255, 255, 0.14),
          0 0 0 3px rgba(var(--accent-rgb), 0.18);
      }

      .theme-swatch.is-active::after {
        position: absolute;
        inset: 10px;
        border-radius: 999px;
        background: #fff;
        content: "";
      }

      .language-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.055);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .language-button.is-active {
        border-color: rgba(var(--accent-rgb), 0.42);
        background: rgba(var(--accent-rgb), 0.14);
        color: #e3fffb;
      }

      .preview-stage,
      .dashboard-stage {
        display: grid;
        flex: 1;
        place-items: center;
        padding: clamp(54px, 11vh, 118px) 0 30px;
      }

      .login-card {
        position: relative;
        width: min(100%, 430px);
        padding: 34px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .card-mark {
        width: 46px;
        height: 46px;
        font-size: 13px;
      }

      .card-title {
        margin: 28px 0 6px;
        color: var(--text);
        font-size: 30px;
        font-weight: 800;
        line-height: 1.18;
      }

      .card-subtitle {
        margin: 0 0 30px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .form {
        display: grid;
        gap: 14px;
      }

      .form-error {
        min-height: 19px;
        margin: -2px 0 0;
        color: #ff8f9b;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .form-error:empty {
        display: none;
      }

      .field {
        position: relative;
        display: block;
      }

      .field > svg {
        position: absolute;
        top: 50%;
        left: 17px;
        width: 18px;
        height: 18px;
        color: var(--dim);
        pointer-events: none;
        transform: translateY(-50%);
      }

      .field input {
        width: 100%;
        height: 52px;
        padding: 0 46px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        outline: none;
        appearance: none;
        background: var(--surface-muted);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        line-height: 52px;
      }

      .field input::placeholder {
        color: var(--dim);
        font-weight: 600;
      }

      .field input:focus {
        border-color: rgba(var(--accent-rgb), 0.58);
        box-shadow: 0 0 0 3px var(--focus);
      }

      .eye-button {
        position: absolute;
        top: 50%;
        right: 11px;
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--dim);
        transform: translateY(-50%);
      }

      .eye-button svg {
        width: 18px;
        height: 18px;
      }

      .submit {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 52px;
        margin-top: 4px;
        border: 1px solid var(--accent-strong);
        border-radius: var(--radius);
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        box-shadow: 0 16px 34px rgba(var(--accent-rgb), 0.22);
      }

      .console-panel {
        width: min(100%, 820px);
        padding: 28px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .console-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--line);
      }

      .console-heading {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .console-title {
        margin: 0;
        color: var(--text);
        font-size: 28px;
        font-weight: 800;
        line-height: 1.12;
      }

      .console-subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .logout-button {
        min-height: 36px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.055);
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .dashboard-card {
        min-height: 118px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.045);
      }

      .dashboard-card span {
        display: block;
        color: var(--dim);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .dashboard-card strong {
        display: block;
        margin-top: 10px;
        color: var(--text);
        font-size: 24px;
        line-height: 1.1;
      }

      .dashboard-card p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .status-line {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .status-line::before {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 5px rgba(var(--accent-rgb), 0.12);
        content: "";
      }

      .submit:focus-visible,
      .logout-button:focus-visible,
      .language-button:focus-visible,
      .theme-swatch:focus-visible,
      .eye-button:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      @media (max-width: 560px) {
        .shell {
          width: min(100vw - 28px, 430px);
          padding-top: 20px;
        }

        .brand {
          font-size: 19px;
        }

        .nav {
          align-items: flex-start;
        }

        .panel-controls {
          align-items: flex-end;
          flex-direction: column;
          gap: 8px;
        }

        .theme-swatch {
          width: 32px;
          height: 32px;
        }

        .preview-stage {
          padding-top: 44px;
        }

        .login-card {
          padding: 24px;
        }

        .console-panel {
          padding: 20px;
        }

        .console-top {
          flex-direction: column;
        }

        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <header class="nav">
          <a class="brand" href="#" aria-label="StratiX VPN">
            <span class="brand-mark">SX</span>
            <span>StratiX VPN</span>
          </a>

          <div class="panel-controls">
            <div class="theme-controls" aria-label="Цвет темы">
              <button
                class="theme-swatch is-active"
                type="button"
                data-theme="ocean"
                aria-label="Бирюзовая тема"
                style="--swatch-a: #15a895; --swatch-b: #6266d9"
              ></button>
              <button
                class="theme-swatch"
                type="button"
                data-theme="violet"
                aria-label="Фиолетовая тема"
                style="--swatch-a: #8b7cf6; --swatch-b: #22d3ee"
              ></button>
              <button
                class="theme-swatch"
                type="button"
                data-theme="amber"
                aria-label="Янтарная тема"
                style="--swatch-a: #f1a638; --swatch-b: #15a895"
              ></button>
              <button
                class="theme-swatch"
                type="button"
                data-theme="blue"
                aria-label="Синяя тема"
                style="--swatch-a: #4d9fff; --swatch-b: #7d5cff"
              ></button>
            </div>
            <div class="language-controls" aria-label="Language">
              <button class="language-button is-active" type="button" data-language="ru">RU</button>
              <button class="language-button" type="button" data-language="en">EN</button>
            </div>
          </div>
        </header>

        <main class="preview-stage" data-login-screen>
          <section class="login-card" aria-label="Login preview">
            <span class="card-mark">SX</span>
            <h1 class="card-title" data-i18n="loginTitle">Вход</h1>
            <p class="card-subtitle" data-i18n="loginSubtitle">Доступ только для администратора</p>

            <form class="form" aria-label="Demo login form">
              <label class="field">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
                <input
                  autocomplete="username"
                  type="text"
                  data-login-username
                  data-i18n-placeholder="username"
                />
              </label>
              <label class="field">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M7 10V8a5 5 0 0 1 10 0v2M6.5 10h11A1.5 1.5 0 0 1 19 11.5v7A1.5 1.5 0 0 1 17.5 20h-11A1.5 1.5 0 0 1 5 18.5v-7A1.5 1.5 0 0 1 6.5 10Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
                <input
                  autocomplete="current-password"
                  type="password"
                  data-login-password
                  data-i18n-placeholder="password"
                />
                <button class="eye-button" type="button" aria-label="Show password" data-password-toggle>
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                      d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"
                      stroke="currentColor"
                      stroke-width="1.7"
                    />
                    <path
                      d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                      stroke="currentColor"
                      stroke-width="1.7"
                    />
                  </svg>
                </button>
              </label>
              <p class="form-error" aria-live="polite" data-login-error></p>
              <button class="submit" type="submit" data-i18n="loginButton">Войти</button>
            </form>
          </section>
        </main>

        <main class="dashboard-stage is-hidden" data-dashboard-screen>
          <section class="console-panel" aria-label="StratiX console">
            <div class="console-top">
              <div class="console-heading">
                <span class="card-mark">SX</span>
                <div>
                  <h1 class="console-title" data-i18n="consoleTitle">StratiX Console</h1>
                  <p class="console-subtitle" data-i18n="consoleSubtitle">
                    Управление VPN-доступом и ботом
                  </p>
                </div>
              </div>
              <button class="logout-button" type="button" data-logout data-i18n="logoutButton">
                Выйти
              </button>
            </div>

            <div class="dashboard-grid">
              <article class="dashboard-card">
                <span data-i18n="cardUsersLabel">Пользователи</span>
                <strong>12</strong>
                <p data-i18n="cardUsersText">Клиенты получают ключи через Telegram.</p>
              </article>
              <article class="dashboard-card">
                <span data-i18n="cardProtocolsLabel">Протоколы</span>
                <strong>AWG / WG / VLESS</strong>
                <p data-i18n="cardProtocolsText">Выдача конфигов и ссылок включена.</p>
              </article>
              <article class="dashboard-card">
                <span data-i18n="cardStatusLabel">Статус</span>
                <strong class="status-line" data-i18n="cardStatusValue">Онлайн</strong>
                <p data-i18n="cardStatusText">Панель готова к проверке.</p>
              </article>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script>
      const dictionary = {
        ru: {
          loginTitle: "Вход",
          loginSubtitle: "Доступ только для администратора",
          username: "Логин",
          password: "Пароль",
          loginButton: "Войти",
          loginError: "Введите логин и пароль.",
          consoleTitle: "StratiX Console",
          consoleSubtitle: "Управление VPN-доступом и ботом",
          logoutButton: "Выйти",
          cardUsersLabel: "Пользователи",
          cardUsersText: "Клиенты получают ключи через Telegram.",
          cardProtocolsLabel: "Протоколы",
          cardProtocolsText: "Выдача конфигов и ссылок включена.",
          cardStatusLabel: "Статус",
          cardStatusValue: "Онлайн",
          cardStatusText: "Панель готова к проверке."
        },
        en: {
          loginTitle: "Sign in",
          loginSubtitle: "Administrator access only",
          username: "Username",
          password: "Password",
          loginButton: "Log in",
          loginError: "Enter username and password.",
          consoleTitle: "StratiX Console",
          consoleSubtitle: "VPN access and bot control",
          logoutButton: "Log out",
          cardUsersLabel: "Users",
          cardUsersText: "Clients receive keys through Telegram.",
          cardProtocolsLabel: "Protocols",
          cardProtocolsText: "Config and link delivery is enabled.",
          cardStatusLabel: "Status",
          cardStatusValue: "Online",
          cardStatusText: "Panel is ready for review."
        }
      };

      const availableThemes = ["ocean", "violet", "amber", "blue"];

      const state = {
        language: localStorage.getItem("stratix-preview-language") || "ru",
        theme: availableThemes.includes(localStorage.getItem("stratix-preview-theme"))
          ? localStorage.getItem("stratix-preview-theme")
          : "ocean"
      };

      function translate() {
        const copy = dictionary[state.language];
        document.documentElement.lang = state.language;
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          node.textContent = copy[key];
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
          const key = node.getAttribute("data-i18n-placeholder");
          node.setAttribute("placeholder", copy[key]);
        });
        document.querySelectorAll("[data-language]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.language === state.language);
        });
        const loginError = document.querySelector("[data-login-error]");
        if (loginError && loginError.textContent.trim()) {
          loginError.textContent = copy.loginError;
        }
      }

      function applyTheme() {
        document.body.dataset.theme = state.theme;
        document.querySelectorAll(".theme-swatch[data-theme]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.theme === state.theme);
        });
        localStorage.setItem("stratix-preview-theme", state.theme);
      }

      function setAuthenticated(isAuthenticated) {
        document
          .querySelector("[data-login-screen]")
          .classList.toggle("is-hidden", isAuthenticated);
        document
          .querySelector("[data-dashboard-screen]")
          .classList.toggle("is-hidden", !isAuthenticated);
        if (isAuthenticated) {
          sessionStorage.setItem("stratix-preview-auth", "1");
          document.querySelector("[data-login-error]").textContent = "";
          return;
        }
        sessionStorage.removeItem("stratix-preview-auth");
        document.querySelector("[data-login-password]").value = "";
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () => {
          state.language = button.dataset.language;
          localStorage.setItem("stratix-preview-language", state.language);
          translate();
        });
      });

      document.querySelectorAll(".theme-swatch[data-theme]").forEach((button) => {
        button.addEventListener("click", () => {
          state.theme = button.dataset.theme;
          applyTheme();
        });
      });

      document.querySelector("[data-password-toggle]").addEventListener("click", () => {
        const input = document.querySelector('input[type="password"], input[data-password-visible]');
        const isVisible = input.type === "text";
        input.type = isVisible ? "password" : "text";
        input.toggleAttribute("data-password-visible", !isVisible);
      });

      document.querySelector(".form").addEventListener("submit", (event) => {
        event.preventDefault();
        const username = document.querySelector("[data-login-username]").value.trim();
        const password = document.querySelector("[data-login-password]").value;
        if (username && password) {
          setAuthenticated(true);
          return;
        }
        document.querySelector("[data-login-error]").textContent =
          dictionary[state.language].loginError;
      });

      document.querySelector("[data-logout]").addEventListener("click", () => {
        setAuthenticated(false);
      });

      applyTheme();
      translate();
